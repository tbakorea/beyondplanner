<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f5ef" />
    <title>Beyond Work Login</title>
    <link rel="stylesheet" href="../auth/styles.css?v=20260630a" />
  </head>
  <body data-auth-page="login">
    <main class="auth-shell">
      <section class="brand-panel">
        <p class="eyebrow">beyond ai planning system</p>
        <h1>Beyond Work</h1>
        <p>일정, 프로젝트, 자금흐름을 하나의 실행 시스템으로 연결합니다.</p>
        <div class="tier-list" aria-label="플래너 등급">
          <span>Staff</span>
          <span>Manager</span>
          <span>Director</span>
          <strong>CEO</strong>
        </div>
      </section>

      <section class="auth-card" aria-label="로그인">
        <div class="auth-tabs">
          <button class="is-active" id="loginTab" type="button">로그인</button>
        </div>
        <form id="loginForm" class="auth-form">
          <label>
            이메일
            <input id="loginEmail" type="email" autocomplete="email" required placeholder="you@example.com" />
          </label>
          <label>
            비밀번호
            <input id="loginPassword" type="password" autocomplete="current-password" required placeholder="비밀번호" />
          </label>
          <button class="primary-action" type="submit">확인</button>
        </form>
        <p class="auth-message" id="authMessage" role="status"></p>
        <p class="auth-switch">아직 계정이 없으신가요? <a id="signupLink" href="../signup/">회원가입</a></p>
      </section>
    </main>

    <script src="../auth/auth.js?v=20260630a"></script>
  </body>
</html>
