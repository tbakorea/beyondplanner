<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=./auth/index.html" />
    <title>Beyond Work</title>
    <style>
      :root {
        color: #24362e;
        background: #f7f5ef;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        margin: 0;
      }

      main {
        width: min(420px, calc(100vw - 40px));
        border: 1px solid rgba(95, 118, 104, 0.18);
        border-radius: 10px;
        background: rgba(255, 253, 248, 0.88);
        box-shadow: 0 18px 40px rgba(38, 50, 56, 0.08);
        padding: 28px;
      }

      p {
        margin: 0 0 16px;
        color: #66756c;
        line-height: 1.55;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 32px;
        line-height: 1;
      }

      a {
        display: inline-flex;
        min-height: 40px;
        align-items: center;
        border-radius: 999px;
        background: #24362e;
        color: #fffefa;
        padding: 0 18px;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Beyond Work</h1>
      <p>로그인 화면으로 이동합니다.</p>
      <a href="./auth/index.html">로그인으로 이동</a>
    </main>
    <script>
      window.location.replace("./auth/index.html");
    </script>
  </body>
</html>
